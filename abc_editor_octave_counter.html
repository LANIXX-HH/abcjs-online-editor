<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABC Noten-Editor</title>
<style>
:root,[data-theme="light"]{
  --bg-page:#F2F3F5;--bg-primary:#FFFFFF;--bg-secondary:#EAECEF;--bg-tertiary:#DDE0E4;
  --border:#C8CDD4;--text:#1A1D21;--text2:#5A6070;
  --blue:#185FA5;--blue-light:#E3EDF8;--blue-dark:#0F4A8F;--orange:#C94F00;
  --green-bg:#E5F2E0;--green-text:#1E5C0A;--shadow:rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg-page:#1A1C20;--bg-primary:#23262C;--bg-secondary:#2C2F38;--bg-tertiary:#363940;
  --border:#44474F;--text:#E4E6EB;--text2:#9198A8;
  --blue:#4D9EE8;--blue-light:#1A2E45;--blue-dark:#2673C0;--orange:#F07830;
  --green-bg:#1A2E1A;--green-text:#6FCF6F;--shadow:rgba(0,0,0,.3);
}

/* Voice colors */
:root{
  --v1-hue:220;--v2-hue:340;--v3-hue:150;--v4-hue:30;
  --v1:#1A5FA8;--v1-bg:#E6EFF8;--v1-border:#A0BDD8;
  --v2:#9B2255;--v2-bg:#F8E6EE;--v2-border:#D8A0B8;
  --v3:#1A6B3A;--v3-bg:#E6F5EC;--v3-border:#A0D4B4;
  --v4:#8B5500;--v4-bg:#F5EEE0;--v4-border:#D4BF98;
}
[data-theme="dark"]{
  --v1:#5B9FE8;--v1-bg:#1A2E45;--v1-border:#2E4A6E;
  --v2:#E87AAA;--v2-bg:#3A1A2A;--v2-border:#6E2A4A;
  --v3:#5EC882;--v3-bg:#1A2E22;--v3-border:#2A5E3E;
  --v4:#D4A055;--v4-bg:#2E2010;--v4-border:#6E4A1A;
}

/* abcjs player */
.abcjs-inline-audio{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:8px 12px;background:var(--bg-secondary);border-top:1px solid var(--border);font-family:system-ui,sans-serif}
.abcjs-inline-audio .abcjs-btn{background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background .1s}
.abcjs-inline-audio .abcjs-btn:hover{background:var(--bg-tertiary)}
.abcjs-inline-audio .abcjs-btn svg{width:20px;height:20px;fill:currentColor}
.abcjs-inline-audio .abcjs-pushed{background:var(--blue);color:#fff;border-color:var(--blue)}
.abcjs-inline-audio .abcjs-midi-progress-background{flex:1;height:6px;background:var(--border);border-radius:3px;cursor:pointer;border:none;padding:0;position:relative;min-width:80px}
.abcjs-inline-audio .abcjs-midi-progress-indicator{position:absolute;top:-3px;left:0;width:12px;height:12px;border-radius:50%;background:var(--blue);transform:translateX(-50%);pointer-events:none}
.abcjs-inline-audio .abcjs-midi-clock{font-size:12px;font-family:monospace;color:var(--text2);min-width:35px}
.abcjs-inline-audio .abcjs-tempo-wrapper{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2)}
.abcjs-inline-audio .abcjs-midi-tempo{width:44px;font-size:12px;font-family:monospace;border:1px solid var(--border);border-radius:4px;background:var(--bg-primary);color:var(--text);padding:2px 4px;text-align:center}
.abcjs-inline-audio .abcjs-midi-current-tempo{font-family:monospace}
.abcjs-inline-audio .abcjs-loading svg circle{stroke:var(--blue);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg);transform-origin:50% 50%}}
.abcjs-inline-audio .abcjs-loading-svg,.abcjs-inline-audio .abcjs-pause-svg{display:none}
.abcjs-inline-audio .abcjs-play-svg{display:block}
.abcjs-inline-audio.abcjs-playing .abcjs-play-svg{display:none}
.abcjs-inline-audio.abcjs-playing .abcjs-pause-svg{display:block}
.abcjs-inline-audio.abcjs-loading .abcjs-play-svg{display:none}
.abcjs-inline-audio.abcjs-loading .abcjs-loading-svg{display:block}
.abcjs-css-warning{display:none!important}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;background:var(--bg-page);font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:var(--text);transition:background .2s,color .2s;overflow:hidden}
.wrap{display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto auto 1fr;border:1px solid var(--border);border-radius:10px;overflow:hidden;height:100vh;background:var(--bg-primary);box-shadow:0 2px 12px var(--shadow)}

/* ── Voice selector bar ── */
.voice-bar{grid-column:1/-1;background:var(--bg-page);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px}
.voice-bar-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap}
.voice-switcher{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.vbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;cursor:pointer;border:none;border-right:1px solid var(--border);font-family:inherit;transition:all .15s;background:var(--bg-secondary);min-width:72px}
.vbtn:last-child{border-right:none}
.vbtn .vname{font-size:12px;font-weight:700;line-height:1}
.vbtn .vrole{font-size:9px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;line-height:1;margin-top:2px}
.vbtn[data-v="1"]{--vc:var(--v1);--vbg:var(--v1-bg);--vborder:var(--v1-border)}
.vbtn[data-v="2"]{--vc:var(--v2);--vbg:var(--v2-bg);--vborder:var(--v2-border)}
.vbtn[data-v="3"]{--vc:var(--v3);--vbg:var(--v3-bg);--vborder:var(--v3-border)}
.vbtn[data-v="4"]{--vc:var(--v4);--vbg:var(--v4-bg);--vborder:var(--v4-border)}
.vbtn.active{background:var(--vbg);color:var(--vc)}
.vbtn.active .vname{color:var(--vc)}
.vbtn.active .vrole{color:var(--vc)}
.vbtn:not(.active){color:var(--text2)}
.vbtn:not(.active):hover{background:var(--bg-tertiary)}
.voice-mode-toggle{display:flex;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:20px;overflow:hidden;padding:2px;gap:2px;margin-left:4px}
.vm-btn{padding:3px 10px;border-radius:16px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.vm-btn.active{background:var(--bg-primary);color:var(--text);box-shadow:0 1px 4px var(--shadow)}
.voice-count-label{font-size:11px;color:var(--text2);margin-left:4px}
.voice-count-label b{color:var(--text)}

/* ── Toolbar ── */
.toolbar{grid-column:1/-1;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;position:relative;transition:background .2s,border-color .2s}
.toolbar[data-vtb="1"]{background:var(--v1-bg);border-bottom-color:var(--v1-border)}
.toolbar[data-vtb="2"]{background:var(--v2-bg);border-bottom-color:var(--v2-border)}
.toolbar[data-vtb="3"]{background:var(--v3-bg);border-bottom-color:var(--v3-border)}
.toolbar[data-vtb="4"]{background:var(--v4-bg);border-bottom-color:var(--v4-border)}
.tg{display:flex;gap:3px;align-items:center;padding-right:7px;border-right:1px solid var(--border)}
.tg:last-child{border-right:none;padding-right:0}
.tl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;white-space:nowrap}
.btn{background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;transition:background .1s,border-color .1s;line-height:1.2}
.btn:hover{background:var(--bg-tertiary)}
.btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sq{width:27px;height:27px;padding:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.note-btn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;min-width:30px;height:34px;justify-content:center}
.note-btn .nb-main{font-size:13px;font-weight:600;line-height:1}
.note-btn .nb-sub{font-size:9px;color:var(--text2);line-height:1}
/* active note button tinted by voice color */
.toolbar[data-vtb="1"] .note-btn:hover,.toolbar[data-vtb="1"] .note-btn.active{background:var(--v1-bg);border-color:var(--v1-border);color:var(--v1)}
.toolbar[data-vtb="2"] .note-btn:hover,.toolbar[data-vtb="2"] .note-btn.active{background:var(--v2-bg);border-color:var(--v2-border);color:var(--v2)}
.toolbar[data-vtb="3"] .note-btn:hover,.toolbar[data-vtb="3"] .note-btn.active{background:var(--v3-bg);border-color:var(--v3-border);color:var(--v3)}
.toolbar[data-vtb="4"] .note-btn:hover,.toolbar[data-vtb="4"] .note-btn.active{background:var(--v4-bg);border-color:var(--v4-border);color:var(--v4)}

.theme-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:20px;overflow:hidden;padding:2px;gap:2px}
.theme-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);font-family:inherit;transition:all .18s;white-space:nowrap}
.theme-btn.active{background:var(--bg-primary);color:var(--text);box-shadow:0 1px 4px var(--shadow)}
.theme-btn svg{width:13px;height:13px;fill:currentColor}
.counter-val{font-size:12px;font-family:monospace;font-weight:700;min-width:28px;text-align:center;padding:2px 4px;border-radius:4px;background:var(--bg-primary);border:1px solid var(--border);color:var(--text);line-height:1.4}
.counter-val.nonzero{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}

/* ── Sidebar ── */
.sidebar{background:var(--bg-secondary);border-right:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.stitle{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fl{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.flabel{font-size:11px;color:var(--text2)}
.fi{background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:12px;color:var(--text);font-family:inherit;width:100%}
.fi:focus{outline:none;border-color:var(--blue)}
.register-toggle{display:flex;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;overflow:hidden;height:48px;position:relative}
.reg-pill{position:absolute;top:3px;bottom:3px;width:calc(50% - 6px);border-radius:6px;background:var(--blue);transition:left .2s cubic-bezier(.4,0,.2,1);z-index:0;opacity:.15}
.reg-pill.down{left:3px}.reg-pill.up{left:calc(50% + 3px)}
.reg-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;padding:4px 6px;position:relative;z-index:1}
.reg-btn .reg-notes{font-size:13px;font-weight:700;line-height:1;letter-spacing:1px;color:var(--text2)}
.reg-btn .reg-label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.reg-btn.active .reg-notes,.reg-btn.active .reg-label{color:var(--blue)}
.reg-divider{width:1px;background:var(--border);align-self:stretch;z-index:1}
.namesys-row{display:flex;gap:4px;margin-bottom:6px}
.namesys-btn{flex:1;padding:5px 3px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.namesys-btn:hover{border-color:var(--blue);background:var(--blue-light)}
.namesys-btn.active{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 1.5px var(--blue)}
.namesys-btn .ns-title{font-size:11px;font-weight:600;color:var(--text);display:block}
.namesys-btn .ns-sub{font-size:9px;color:var(--text2);display:block;margin-top:1px}
.namesys-btn.active .ns-title{color:var(--blue)}
.lyrics-toggle{display:flex;flex-direction:column;align-items:flex-start;gap:1px;width:100%;padding:7px 10px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left}
.lyrics-toggle:hover{border-color:var(--blue)}
.lyrics-toggle .lt-state{font-size:13px;font-weight:700;color:var(--text2)}
.lyrics-toggle .lt-desc{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.lyrics-toggle.on{background:var(--green-bg);border-color:var(--green-text)}
.lyrics-toggle.on .lt-state{color:var(--green-text)}
.lyrics-toggle.on .lt-desc{color:var(--green-text)}
.clef-row{display:flex;gap:5px;margin-bottom:6px}
.clef-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-family:inherit}
.clef-btn:hover{border-color:var(--blue);background:var(--blue-light)}
.clef-btn.active{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 1.5px var(--blue)}
.clef-icon{font-size:22px;line-height:1;color:var(--text)}
.clef-label{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.clef-btn.active .clef-label,.clef-btn.active .clef-icon{color:var(--blue)}
.tpl-btn{text-align:left;padding:5px 7px;font-size:11px;width:100%;margin-bottom:3px}
.tab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:6px}
.tab{padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.panel{display:none}.panel.active{display:block}
.help-box{font-size:11px;color:var(--text2);line-height:1.8;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:7px 9px}
.help-box b{color:var(--text)}
.action-row{display:flex;gap:5px}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500}
.badge-b{background:var(--blue-light);color:var(--blue)}
.badge-g{background:var(--green-bg);color:var(--green-text)}

/* ── Voice settings panel in sidebar ── */
.voice-settings{border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--bg-primary);margin-bottom:6px;transition:border-color .2s,background .2s}
.voice-settings[data-vs="1"]{border-color:var(--v1-border);background:var(--v1-bg)}
.voice-settings[data-vs="2"]{border-color:var(--v2-border);background:var(--v2-bg)}
.voice-settings[data-vs="3"]{border-color:var(--v3-border);background:var(--v3-bg)}
.voice-settings[data-vs="4"]{border-color:var(--v4-border);background:var(--v4-bg)}
.voice-settings-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.voice-settings[data-vs="1"] .voice-settings-title{color:var(--v1)}
.voice-settings[data-vs="2"] .voice-settings-title{color:var(--v2)}
.voice-settings[data-vs="3"] .voice-settings-title{color:var(--v3)}
.voice-settings[data-vs="4"] .voice-settings-title{color:var(--v4)}
.vs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.voice-settings[data-vs="1"] .vs-dot{background:var(--v1)}
.voice-settings[data-vs="2"] .vs-dot{background:var(--v2)}
.voice-settings[data-vs="3"] .vs-dot{background:var(--v3)}
.voice-settings[data-vs="4"] .vs-dot{background:var(--v4)}

/* ── Main ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.score-panel{flex:1;padding:12px;background:var(--bg-primary);overflow:auto;position:relative}
#paper0{width:100%}#paper0 svg{width:100%;height:auto}
/* Dark mode: render score elements in light color directly (no invert) */
[data-theme="dark"] #paper0 svg path{fill:#E4E6EB;stroke:#E4E6EB}
[data-theme="dark"] #paper0 svg text,[data-theme="dark"] #paper0 svg tspan{fill:#E4E6EB}
[data-theme="dark"] #paper0 svg .abcjs-staff path{fill:#9198A8;stroke:#9198A8}
[data-theme="dark"] #paper0 svg .abcjs-bar path{fill:#B0B6C4;stroke:#B0B6C4}
/* keep highlight + drag colors visible */
[data-theme="dark"] #paper0 .abcjs-note-dragging path,[data-theme="dark"] #paper0 .abcjs-note-dragging ellipse,[data-theme="dark"] #paper0 .abcjs-note-dragging rect{fill:var(--orange)!important;stroke:var(--orange)!important}
[data-theme="dark"] #paper0 .abcjs-highlight path,[data-theme="dark"] #paper0 .abcjs-highlight ellipse,[data-theme="dark"] #paper0 .abcjs-highlight rect{fill:var(--blue)!important;stroke:var(--blue)!important}
[data-theme="dark"] #paper0 .abcjs-note:hover path,[data-theme="dark"] #paper0 .abcjs-note:hover ellipse{fill:var(--orange)!important;stroke:var(--orange)!important}
.abcjs-note-dragging path,.abcjs-note-dragging ellipse,.abcjs-note-dragging rect{fill:var(--orange)!important}
/* native abcjs drag/select feedback */
#paper0 .abcjs-note{cursor:ns-resize}
#paper0 .abcjs-note:hover path,#paper0 .abcjs-note:hover ellipse{fill:var(--orange)!important;opacity:.85}
#paper0 .abcjs-note.abcjs-selected path,#paper0 .abcjs-note.abcjs-selected ellipse{fill:var(--blue)!important}
#paper0 .abcjs-dragging path,#paper0 .abcjs-dragging ellipse{fill:var(--orange)!important}
#paper0 .abcjs-highlight path,#paper0 .abcjs-highlight ellipse,#paper0 .abcjs-highlight rect{fill:var(--blue)!important}
#paper0 .abcjs-cursor{stroke:var(--orange)!important;stroke-width:2px}
#paper0 [data-index]{cursor:grab}
.drag-tip{position:absolute;background:var(--text);color:var(--bg-primary);font-size:12px;font-family:monospace;font-weight:600;padding:4px 9px;border-radius:6px;pointer-events:none;display:none;z-index:100;white-space:nowrap;box-shadow:0 2px 10px var(--shadow)}
.divider{height:1px;background:var(--border)}
.abc-panel{padding:8px 12px 10px;background:var(--bg-secondary)}
.abc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.abc-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.code-wrap{position:relative;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.code-hl{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;padding:7px 9px;font-family:monospace;font-size:11.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;color:transparent;overflow:hidden}
.abc-ta{position:relative;width:100%;background:transparent;border:none;padding:7px 9px;font-family:monospace;font-size:11.5px;color:var(--text);resize:vertical;min-height:82px;line-height:1.5;caret-color:var(--text)}
.abc-ta:focus{outline:none}
.sh-h{color:#0C8A5A;font-weight:600}.sh-hv{color:#16A085}.sh-b{color:#888}.sh-a{color:#C0392B;font-weight:700}.sh-r{color:#8E44AD}.sh-n{color:#1A6FC4}.sh-l{color:#B07020}.sh-c{color:#16A085}
[data-theme="dark"] .sh-h{color:#5CC9A0}[data-theme="dark"] .sh-hv{color:#4DC9A8}[data-theme="dark"] .sh-a{color:#F07070}[data-theme="dark"] .sh-r{color:#C39AEC}[data-theme="dark"] .sh-n{color:#79B8FF}[data-theme="dark"] .sh-l{color:#E8A85F}[data-theme="dark"] .sh-c{color:#56D3C4}[data-theme="dark"] .sh-b{color:#888}
.warn-box{background:#FCEBEB;border:1px solid #F09595;border-radius:6px;padding:6px 9px;font-size:11px;color:#A32D2D;margin-top:6px;display:none}
[data-theme="dark"] .warn-box{background:#3A1A1A;border-color:#8B3030;color:#F07070}
.msg{font-size:11px;color:var(--text2);margin-top:3px;min-height:13px}
.bottom-bar{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg-secondary);border-top:1px solid var(--border);flex-wrap:wrap}
.dl-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:4px 11px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .1s}
.dl-btn:hover{background:var(--blue-dark)}
.zoom-wrap{display:flex;align-items:center;gap:5px;margin-left:auto}
.zoom-lbl{font-size:11px;color:var(--text2)}
input[type=range]{accent-color:var(--blue)}
input[type=checkbox]{accent-color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">

<!-- ── Voice selector bar ── -->
<div class="voice-bar">
  <span class="voice-bar-label">Stimme</span>
  <div class="voice-switcher">
    <button class="vbtn active" data-v="1">
      <span class="vname">S</span>
      <span class="vrole">Sopran</span>
    </button>
    <button class="vbtn" data-v="2">
      <span class="vname">A</span>
      <span class="vrole">Alt</span>
    </button>
    <button class="vbtn" data-v="3">
      <span class="vname">T</span>
      <span class="vrole">Tenor</span>

// ── insertAtCursor — in multi mode, insert [V:n] tag if needed ────────
function insertAtCursor(text){
  if(voiceMode==='multi'){
    insertIntoVoice(activeVoice,text);
    return;
  }
  const ta=abcTa,s=ta.selectionStart,e=ta.selectionEnd;
  const before=ta.value.slice(0,s),after=ta.value.slice(e);
  const sp=(before.length>0&&!/[\s\n|:]$/.test(before))?' ':'';
  ta.value=before+sp+text+after;
  const p=s+sp.length+text.length;ta.setSelectionRange(p,p);ta.focus();
  updateHL();scheduleRender();
}

function insertIntoVoice(v,text){
  const ta=abcTa;
  let val=ta.value;
  const marker='[V:'+v+']';
  // Find last occurrence of this voice marker
  let lastMarker=val.lastIndexOf(marker);
  if(lastMarker<0){
    // Append a new voice line
    val=val.trimEnd()+'\n'+marker+' '+text+'\n';
    ta.value=val;updateHL();scheduleRender();return;
  }
  // Find end of that line
  let lineEnd=val.indexOf('\n',lastMarker);
  if(lineEnd<0) lineEnd=val.length;
  // Insert before the newline
  const before=val.slice(0,lineEnd);
  const after=val.slice(lineEnd);
  const sp=(before.length>0&&!/[\s|:]$/.test(before))?' ':'';
  ta.value=before+sp+text+after;
  const p=lineEnd+sp.length+text.length;
  ta.setSelectionRange(p,p);ta.focus();
  updateHL();scheduleRender();
}

// ── Build multi-voice header + skeleton ───────────────────────────────
function getHeader(){
  const t=$('fTitle').value||'Mein Lied',c=$('fComposer').value;
  const m=$('fMeter').value,q=$('fTempo').value,u=$('fUnit').value;
  let h='X:1\nT:'+t+'\n';if(c)h+='C:'+c+'\n';if(m)h+='M:'+m+'\n';
  if(u)h+='L:'+u+'\n';if(q)h+='Q:'+q+'\n';
  if(voiceMode==='multi'){
    // Group voices into staves of 2: (1 2) for SA, (3 4) for TB
    // %%staves with each pair grouped, and a separate V: line per voice
    const n=activeVoiceCount;
    // Build staves grouping: pairs
    let stavesGroups=[];
    if(n===1){ stavesGroups=['1']; }
    else if(n===2){ stavesGroups=['(1 2)']; }
    else if(n===3){ stavesGroups=['(1 2)','3']; }
    else { stavesGroups=['(1 2)','(3 4)']; }
    h+='%%staves '+stavesGroups.join(' ')+'\n';
    // One V: definition line per voice
    for(let i=1;i<=n;i++){
      const vd=VOICE_DEFS[i-1], vst=voiceState[i];
      const clef=vst.clef||vd.clef;
      h+='V:'+i+' clef='+clef+' stem='+vd.stem+' name="'+vd.name+'"\n';
    }
    // Global K:
    const key=$('fKey').value;
    h+='K:'+(key||'C')+'\n';
  } else {
    const key=$('fKey').value,clefDef=(state.clef===''||state.clef==='treble');
    if(!key&&clefDef){}
    else h+='K:'+(key||'none')+((state.clef&&state.clef!=='treble')?' '+state.clef:'')+'\n';
  }
  return h;
}

function getBody(){
  return abcTa.value.split('\n').filter(l=>!/^[XTCMLQKVRW%]:/.test(l)&&!l.startsWith('%%')).join('\n').trim();
}
function setTa(body){abcTa.value=getHeader()+(body?body+'\n':'');updateHL();}

function rebuildAbcFromVoices(){
  if(voiceMode==='single'){
    const body=getBody();
    setTa(body);scheduleRender();return;
  }
  // In multi-voice mode, preserve existing voice lines
  const existing=abcTa.value;
  // Capture existing w: lyric lines (to re-insert after V:2)
  const wLines=existing.split('\n').filter(l=>/^w:/.test(l.trim()));
  // Extract body lines by voice
  const voiceBodies={};
  VOICE_DEFS.forEach(vd=>{
    const re=new RegExp('\\[V:'+vd.v+'\\]([^\\n]*)','g');
    let match,lines=[];
    while((match=re.exec(existing))!==null) lines.push(match[1].trim());
    voiceBodies[vd.v]=lines.join('\n');
  });
  // Rebuild
  let newBody='';
  for(let i=1;i<=activeVoiceCount;i++){
    newBody+='[V:'+i+'] '+(voiceBodies[i]||'z4')+'\n';
    // re-attach lyric line(s) after V:2 (or create empty if lyrics active)
    if(i===2){
      if(wLines.length) newBody+=wLines.join('\n')+'\n';
      else if(lyricsOn) newBody+='w: \n';
    }
  }
  abcTa.value=getHeader()+newBody;
  updateHL();scheduleRender();
}

function applyOctaveToNote(base,octShift){
  const isLower=base===base.toLowerCase()&&/[a-g]/.test(base);

  if(shift===0)return note;
  if(shift>0){if(!isLower&&shift>=1){note=base.toLowerCase();shift--;}note+="'".repeat(shift);}
  else{if(isLower&&shift<=-1){note=base.toUpperCase();shift++;}note+=','.repeat(-shift);}
  return note;
}

// ── Syntax highlighting ───────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function syntaxHL(text){
  if(!syntaxOn)return esc(text);
  return text.split('\n').map(line=>{
    if(/^%%/.test(line))return'<span class="sh-h">'+esc(line)+'</span>';
    if(/^[XTCMLQKVRW]:/.test(line)){const i=line.indexOf(':');return'<span class="sh-h">'+esc(line.slice(0,i+1))+'</span><span class="sh-hv">'+esc(line.slice(i+1))+'</span>';}
    let out='',i=0;
    while(i<line.length){
      const ch=line[i];
      // [V:n] markers
      if(ch==='['&&line[i+1]==='V'){let j=line.indexOf(']',i);if(j>0){out+='<span class="sh-h">'+esc(line.slice(i,j+1))+'</span>';i=j+1;continue;}}
      if(ch==='"'){let j=line.indexOf('"',i+1);if(j<0)j=line.length;out+='<span class="sh-c">'+esc(line.slice(i,j+1))+'</span>';i=j+1;}
      else if(ch==='|'||ch===':'||ch==='['||ch===']'){out+='<span class="sh-b">'+esc(ch)+'</span>';i++;}
      else if(ch==='^'||ch==='_'||ch==='='){let a=ch;if(line[i+1]===ch){a+=line[i+1];i++;}out+='<span class="sh-a">'+esc(a)+'</span>';i++;}
      else if(ch==='z'||ch==='Z'){let r=ch;i++;while(i<line.length&&/[\d\/]/.test(line[i])){r+=line[i];i++;}out+='<span class="sh-r">'+esc(r)+'</span>';}
      else if(/[A-Ga-g]/.test(ch)){let n=ch;i++;while(i<line.length&&(line[i]==="'"||line[i]===',')){n+=line[i];i++;}let l='';while(i<line.length&&/[\d\/]/.test(line[i])){l+=line[i];i++;}out+='<span class="sh-n">'+esc(n)+'</span>'+(l?'<span class="sh-l">'+esc(l)+'</span>':'');}
      else{out+=esc(ch);i++;}
    }
    return out;
  }).join('\n');
}

// ── Diatonic ladder for drag-to-move ──────────────────────────────────
// Ascending list of ABC note tokens (no accidentals), so we can shift a
// note up/down by N diatonic steps and rebuild the token.
const DIATONIC_LADDER=(function(){
  const letters=['C','D','E','F','G','A','B'];
  const out=[];
  // From C,, (octave 2) up to b'' (octave 7)
  out.push('C,,','D,,','E,,','F,,','G,,','A,,','B,,');
  out.push('C,','D,','E,','F,','G,','A,','B,');
  out.push('C','D','E','F','G','A','B');
  out.push('c','d','e','f','g','a','b');
  out.push("c'","d'","e'","f'","g'","a'","b'");
  out.push("c''","d''","e''","f''","g''","a''","b''");
  return out;
})();
function ladderIndex(noteToken){
  // noteToken e.g. "c", "C,", "^F" (strip accidentals first)
  const bare=noteToken.replace(/^[_^=]+/,'');
  let i=DIATONIC_LADDER.indexOf(bare);
  return i;
}
// Parse a note token at [s,e): returns {accidental, pitch, length}
function parseNoteToken(tok){
  const m=tok.match(/^([_^=]*)([A-Ga-g][,']*)([\d\/]*)$/);
  if(!m)return null;
  return {acc:m[1],pitch:m[2],len:m[3]};
}
function midiForPitch(pitch){
  const p=PITCH_TABLE.find(x=>x.abc===pitch);
  return p?p.midi:60;
}

function buildNoteIndex(){
  noteIndex=[];
  if(!visualObj||!visualObj[0])return;
  (visualObj[0].lines||[]).forEach(line=>{
    (line.staff||[]).forEach(staff=>{
      (staff.voices||[]).forEach(voice=>{
        voice.forEach(elem=>{
          if(elem.el_type==='note'&&elem.startChar!=null&&(elem.midiPitches||[]).length>0){
            noteIndex.push({startChar:elem.startChar,endChar:elem.endChar,midi:elem.midiPitches[0].pitch,midiPitches:elem.midiPitches,midiGrace:elem.midiGraceNotePitches||[]});
          }
        });
      });
    });
  });
}

// ── Manual drag: identify note by DOM order, track mouse vertically ───
// We collect all rendered note groups in DOM order; they line up 1:1 with
// noteIndex (same traversal order abcjs uses to render). On mousedown we
// find the nearest note element, then track vertical mouse movement and
// shift the note diatonically, updating the ABC text live.
let manualDrag=null;

function getRenderedNoteEls(){
  // abcjs note groups carry class "abcjs-note" when add_classes is on
  return Array.from(paper0.querySelectorAll('.abcjs-note'));
}

function findClickedNote(clientX, clientY){
  const els=getRenderedNoteEls();
  let best=null,bestDist=Infinity,bestIdx=-1;
  els.forEach((el,i)=>{
    const r=el.getBoundingClientRect();
    // expand hit box a little for easier grabbing
    const pad=6;
    if(clientX>=r.left-pad&&clientX<=r.right+pad&&clientY>=r.top-pad&&clientY<=r.bottom+pad){
      const cx=(r.left+r.right)/2, cy=(r.top+r.bottom)/2;
      const d=(clientX-cx)*(clientX-cx)+(clientY-cy)*(clientY-cy);
      if(d<bestDist){bestDist=d;best=el;bestIdx=i;}
    }
  });
  if(best===null) return null;
  // Map DOM index → noteIndex entry (same order)
  const entry=noteIndex[bestIdx];
  if(!entry) return null;
  return {el:best, entry, idx:bestIdx};
}

paper0.addEventListener('mousedown', e=>{
  if(!noteIndex.length) return;
  const hit=findClickedNote(e.clientX, e.clientY);
  if(!hit) return;
  e.preventDefault();
  const tok=abcTa.value.slice(hit.entry.startChar, hit.entry.endChar);
  const parsed=parseNoteToken(tok);
  if(!parsed){return;}
  const startLadder=ladderIndex(parsed.pitch);
  manualDrag={
    el:hit.el,
    startChar:hit.entry.startChar,
    endChar:hit.entry.endChar,
    acc:parsed.acc,
    len:parsed.len,
    startLadder:startLadder,
    curLadder:startLadder,
    startY:e.clientY,
    moved:false,
  };
  hit.el.classList.add('abcjs-note-dragging');
  paper0.style.cursor='ns-resize';
  showDragTip(e, DIATONIC_LADDER[startLadder]||parsed.pitch);
  document.addEventListener('mousemove', onManualDragMove);
  document.addEventListener('mouseup', onManualDragEnd);
});

function onManualDragMove(e){
  if(!manualDrag) return;
  // ~9px per diatonic step
  const steps=Math.round((manualDrag.startY-e.clientY)/9);
  let newLadder=Math.max(0,Math.min(DIATONIC_LADDER.length-1, manualDrag.startLadder+steps));
  showDragTip(e, DIATONIC_LADDER[newLadder]);
  if(newLadder!==manualDrag.curLadder){
    manualDrag.curLadder=newLadder;
    manualDrag.moved=true;
    applyManualPitch();
  }
}

function onManualDragEnd(e){
  document.removeEventListener('mousemove', onManualDragMove);
  document.removeEventListener('mouseup', onManualDragEnd);
  if(!manualDrag) return;
  paper0.style.cursor='';
  dragTip.style.display='none';
  if(!manualDrag.moved){
    // It was a click — play + select
    const en=noteIndex[ getRenderedNoteEls().indexOf(manualDrag.el) ];
    const sc=manualDrag.startChar, ec=manualDrag.endChar;
    const tok=abcTa.value.slice(sc,ec);
    const parsed=parseNoteToken(tok);
    if(parsed && ABCJS.synth.supportsAudio()){
      ABCJS.synth.playEvent([{pitch:midiForPitch(parsed.pitch),volume:90,duration:0.5,instrument:0,start:0,gap:0}],[],500).catch(()=>{});
    }
    abcTa.focus();
    abcTa.setSelectionRange(sc,ec);
    const lh=parseInt(getComputedStyle(abcTa).lineHeight)||18;
    abcTa.scrollTop=Math.max(0,(abcTa.value.substring(0,sc).split('\n').length-1)*lh-30);
  }
  manualDrag=null;
}

function applyManualPitch(){
  if(!manualDrag) return;
  const newPitch=DIATONIC_LADDER[manualDrag.curLadder];
  const newToken=manualDrag.acc+newPitch+manualDrag.len;
  const text=abcTa.value;
  abcTa.value=text.slice(0,manualDrag.startChar)+newToken+text.slice(manualDrag.endChar);
  // Update endChar in case length of token changed
  manualDrag.endChar=manualDrag.startChar+newToken.length;
  updateHL();
  // re-render immediately so the note visibly jumps to the new line
  clearTimeout(rt);
  renderAbc();
  // play the new pitch
  if(ABCJS.synth.supportsAudio()){
    ABCJS.synth.playEvent([{pitch:midiForPitch(newPitch),volume:90,duration:0.3,instrument:0,start:0,gap:0}],[],300).catch(()=>{});
  }
}

function showDragTip(e, noteAbc){
  const panel=$('scorePanel').getBoundingClientRect();
  const entry=PITCH_TABLE.find(p=>p.abc===noteAbc);
  dragTip.textContent=noteAbc+(entry?'  ('+entry.midi+')':'');
  dragTip.style.left=(e.clientX-panel.left+14)+'px';
  dragTip.style.top=(e.clientY-panel.top-34)+'px';
  dragTip.style.display='block';
}

function renderAbc(){
  const abc=abcTa.value;errBox.style.display='none';warnTa.style.display='none';const warns=[];
  try{
    visualObj=ABCJS.renderAbc('paper0',abc,{
      responsive:'resize',
      add_classes:true,
      clickListener:function(){}, // handled manually via mousedown
      visualTranspose:state.transpose,
      scale:zoomLevel/100,
      warningCallback:w=>warns.push(w)
    });
    if(warns.length){errBox.textContent='⚠ '+warns[0];errBox.style.display='block';warnTa.textContent='⚠ '+warns[0];warnTa.style.display='block';}
    const n=(abc.match(/[A-Ga-gz][,']*[\d\/]*/g)||[]).filter(x=>!/^[XTCMLQKVRW]$/.test(x));
    const b=(abc.match(/\|/g)||[]).length;
    noteCount.textContent=n.length+' Noten';barCount.textContent=Math.max(1,b)+' Takte';
    buildNoteIndex();buildPlayer();
  }catch(e){errBox.textContent='✗ '+e.message;errBox.style.display='block';}

async function buildPlayer(){
  if(!visualObj||!visualObj[0]||!ABCJS.synth.supportsAudio())return;
  try{
    synthControl=new ABCJS.synth.SynthController();
    synthControl.load('#player',{
      onStart(){paper0.querySelectorAll('.abcjs-cursor').forEach(el=>el.setAttribute('display','block'));},
      onEvent(ev){
        if(!ev)return;
        paper0.querySelectorAll('.abcjs-cursor').forEach(el=>{if(ev.left!=null){el.setAttribute('x1',ev.left);el.setAttribute('x2',ev.left);}if(ev.top!=null)el.setAttribute('y1',ev.top);if(ev.height!=null)el.setAttribute('y2',ev.top+ev.height);});
        paper0.querySelectorAll('.abcjs-highlight').forEach(el=>el.classList.remove('abcjs-highlight'));
        if(ev.elements)ev.elements.forEach(arr=>{if(Array.isArray(arr))arr.forEach(el=>{if(el)el.classList.add('abcjs-highlight');});else if(arr)arr.classList.add('abcjs-highlight');});
        if(ev.startChar!=null){abcTa.setSelectionRange(ev.startChar,ev.endChar);const lh=parseInt(getComputedStyle(abcTa).lineHeight)||18;abcTa.scrollTop=Math.max(0,(abcTa.value.substring(0,ev.startChar).split('\n').length-1)*lh-30);}
      },
      onFinished(){paper0.querySelectorAll('.abcjs-cursor').forEach(el=>{el.setAttribute('x1',0);el.setAttribute('x2',0);el.setAttribute('y1',0);el.setAttribute('y2',0);});paper0.querySelectorAll('.abcjs-highlight').forEach(el=>el.classList.remove('abcjs-highlight'));}
    },{displayLoop:true,displayRestart:true,displayPlay:true,displayProgress:true,displayWarp:true,displayVolume:true});
    await synthControl.setTune(visualObj[0],false,{});
  }catch(e){console.warn(e);}
}

function scheduleRender(){clearTimeout(rt);rt=setTimeout(()=>{renderAbc();updateHL();},250);}

function deleteLast(){
  if(voiceMode==='multi'){
    // Find the voice marker, delete last token in that line
    const ta=abcTa,text=ta.value;
    const marker='[V:'+activeVoice+']';
    const lastMarker=text.lastIndexOf(marker);
    if(lastMarker<0)return;
    let lineEnd=text.indexOf('\n',lastMarker);
    if(lineEnd<0)lineEnd=text.length;
    const lineContent=text.slice(lastMarker,lineEnd);
    const trimmed=lineContent.replace(/\s+\S+$/,'');
    ta.value=text.slice(0,lastMarker)+trimmed+text.slice(lineEnd);
    updateHL();scheduleRender();return;
  }
  const ta=abcTa,lines=ta.value.split('\n');
  const bi=lines.findIndex(l=>!/^[XTCMLQKVRW%]:/.test(l)&&!l.startsWith('%%'));if(bi<0)return;
  const header=lines.slice(0,bi),body=lines.slice(bi).join('\n').trimEnd();
  ta.value=header.join('\n')+(header.length?'\n':'')+body.replace(/\s+\S+$/,'').trimEnd()+(body.trim()?'\n':'');
  updateHL();scheduleRender();
}

// ── Reusable: load an ABC string and sync all UI fields ───────────────
function loadAbc(abc, mode, voices){
  abcTa.value=abc;
  // Detect mode from content if not given
  if(!mode){ mode=/%%staves|\[V:/.test(abc)?'multi':'single'; }
  if(mode==='multi'){
    voiceMode='multi';
    // count V: definitions
    const vcount=voices || (abc.match(/^V:\d+/gm)||[]).length || 2;
    activeVoiceCount=Math.max(2,Math.min(4,vcount));
    $('vmMulti').classList.add('active');$('vmSingle').classList.remove('active');
    voiceSettingsArea.style.display='block';singleSettingsArea.style.display='none';
    $('voiceCountSel').style.display='inline-block';$('voiceCountSel').value=String(activeVoiceCount);
    updateVoiceButtonsVisibility();
  } else {
    voiceMode='single';
    $('vmSingle').classList.add('active');$('vmMulti').classList.remove('active');
    voiceSettingsArea.style.display='none';singleSettingsArea.style.display='block';
    $('voiceCountSel').style.display='none';updateVoiceButtonsVisibility();
  }
  var fs={fTitle:/^T:(.+)$/m,fComposer:/^C:(.+)$/m};
  Object.keys(fs).forEach(fid=>{var m=abc.match(fs[fid]);$(fid).value=m?m[1].trim():(fid==='fTitle'?'Mein Lied':'');});
  var mm=abc.match(/^M:(.+)$/m);$('fMeter').value=mm?mm[1].trim():'';
  var km=abc.match(/^K:(\S+)/m);$('fKey').value=km?(km[1]==='none'?'':km[1]):'';
  var q=abc.match(/^Q:(\d+)/m);$('fTempo').value=q?q[1]:'';
  var lu=abc.match(/^L:(.+)$/m);$('fUnit').value=lu?lu[1].trim():'';
  updateVoiceCountLabel();buildNoteButtons();syncLyricsState();updateHL();scheduleRender();
  actionMsg.textContent='✓ Geladen';setTimeout(()=>actionMsg.textContent='',2000);
}

// ── Saved songs (localStorage) ────────────────────────────────────────
const SAVE_KEY='abcEditorSongs';
function getSavedSongs(){
  try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]'); }catch(e){ return []; }
}
function setSavedSongs(arr){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(arr)); }catch(e){ alert('Speichern nicht möglich (localStorage blockiert).'); }
}
function renderSavedList(){
  const list=$('savedList'); list.innerHTML='';
  const songs=getSavedSongs();
  if(!songs.length){
    list.innerHTML='<div style="font-size:11px;color:var(--text2);font-style:italic;padding:2px">Noch keine eigenen Lieder</div>';
    return;
  }
  songs.forEach((song,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:3px;align-items:stretch';
    const load=document.createElement('button');
    load.className='btn tpl-btn';load.style.cssText='flex:1;margin-bottom:0';
    load.textContent='💾 '+song.name;
    load.title='Laden: '+song.name;
    load.addEventListener('click',()=>loadAbc(song.abc));
    const del=document.createElement('button');
    del.className='btn';del.style.cssText='padding:4px 7px;font-size:11px';
    del.textContent='🗑';del.title='Löschen';
    del.addEventListener('click',()=>{
      if(confirm('"'+song.name+'" löschen?')){
        const s=getSavedSongs();s.splice(i,1);setSavedSongs(s);renderSavedList();
      }
    });
    row.appendChild(load);row.appendChild(del);
    list.appendChild(row);
  });
}
$('btnSaveSong').addEventListener('click',()=>{
  const defName=$('fTitle').value||'Lied';
  const name=prompt('Name für das gespeicherte Lied:', defName);
  if(!name) return;
  const songs=getSavedSongs();
  const existing=songs.findIndex(s=>s.name===name);
  const entry={name:name, abc:abcTa.value, saved:Date.now()};
  if(existing>=0){ if(!confirm('"'+name+'" überschreiben?')) return; songs[existing]=entry; }
  else songs.push(entry);
  setSavedSongs(songs);
  renderSavedList();
  actionMsg.textContent='✓ Gespeichert: '+name;setTimeout(()=>actionMsg.textContent='',2500);
});

// ── Help modal ────────────────────────────────────────────────────────
const HELP_HTML=`
<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Stimmen (oben)</h3>
<p style="margin:0 0 12px">
<b>S / A / T / B</b> — Stimme auswählen (Sopran, Alt, Tenor, Bass). Die Toolbar färbt sich in der Stimmfarbe.<br>
<b>Einzelstimme / Mehrstimmig</b> — Umschalter. Mehrstimmig erzeugt automatisch <code>%%staves</code> und <code>V:</code>-Zeilen.<br>
<b>2 / 3 / 4 Stimmen</b> — wie viele Stimmen im mehrstimmigen Modus genutzt werden. Sopran+Alt teilen ein System, Tenor+Bass das zweite.
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Noten-Eingabe (Toolbar)</h3>
<p style="margin:0 0 12px">
<b>Note (C–B / Do–Si)</b> — fügt eine Note an der Cursor-Position ein.<br>
<b>Vorzeichen</b> — ♮ kein, ♯ Kreuz (^), ♭ B (_), Doppelkreuz, Doppel-B. Wird vor die nächste Note gesetzt.<br>
<b>Länge</b> — 1/1 ganze, 1/2 halbe, 1/4 Viertel, 1/8 Achtel, 1/16 Sechzehntel Note.<br>
<b>Pause</b> — fügt eine Pause (z) in der gewählten Länge ein.<br>
<b>| Takt</b> — Taktstrich. <b>|:</b> und <b>:|</b> — Wiederholungsklammern.<br>
<b>↵</b> — neue Zeile (im Mehrstimmig-Modus neue Stimmzeile).<br>
<b>⌫</b> — löscht die letzte Note/das letzte Zeichen.
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Oktave & Transponieren</h3>
<p style="margin:0 0 12px">
<b>Oktave +/−</b> — verschiebt die nächste eingegebene Note oktavweise (z.B. c → c' → c'').<br>
<b>Transponieren +/−</b> — verschiebt die gesamte Anzeige um Halbtöne (verändert den Text nicht).<br>
<b>↺</b> — setzt den jeweiligen Zähler auf 0 zurück.
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Lied-Info (Sidebar)</h3>
<p style="margin:0 0 12px">
<b>Titel / Komponist</b> — Kopfzeilen des Stücks.<br>
<b>Taktart, Tonart, Tempo, Einheitslänge (L:)</b> — alle optional (— Keine — entfernt die Zeile).<br>
<b>Register (Oktave)</b> — Riegel: Tief = Großbuchstaben (C D E), Hoch = Kleinbuchstaben (c d e).<br>
<b>Notennamen</b> — Anzeige der Tasten: A B C (deutsch), Do Re Mi (Solfège) oder beides.<br>
<b>Notenschlüssel</b> — Violin, Bass oder Alt; im Mehrstimmig-Modus pro Stimme einstellbar.<br>
<b>Liedtext (w:)</b> — Schalter. An: legt leere <code>w:</code>-Zeilen für Silben unter den Noten an (einstimmig unter jeder Notenzeile, mehrstimmig nach V:2). Aus: entfernt nur leere w:-Zeilen — eingetragener Text bleibt erhalten.
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Notenvorschau</h3>
<p style="margin:0 0 12px">
<b>Klick auf Note</b> — spielt den Ton und markiert sie im ABC-Editor.<br>
<b>Note hoch/runter ziehen</b> — ändert die Tonhöhe; der ABC-Text wird live angepasst.<br>
<b>Abspielleiste</b> — Play/Pause, Loop, Neustart, Fortschritt, Tempo (%), Lautstärke; ein Cursor läuft mit.<br>
<b>Zoom</b> — vergrößert/verkleinert die Partitur (50–200 %).
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Liedtext schreiben (w:)</h3>
<p style="margin:0 0 8px">
Nach dem Aktivieren des <b>Liedtext (w:)</b>-Schalters trägst du die Silben hinter das <code>w:</code> im ABC-Feld ein. Jede Silbe wird der Reihe nach einer Note der Zeile darüber zugeordnet. Die Trennzeichen steuern, wie Silben und Noten zusammenpassen:
</p>
<table style="width:100%;border-collapse:collapse;font-size:12px;margin:0 0 10px">
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">Leer­zeichen</td><td style="padding:4px 8px">trennt Silben → jede geht auf die nächste Note.<br><span style="font-family:monospace;color:var(--text2)">w: Häns chen klein</span></td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">-&nbsp;(Bindestrich)</td><td style="padding:4px 8px">teilt ein Wort in Silben, die auf <b>aufeinander­folgende</b> Noten verteilt werden.<br><span style="font-family:monospace;color:var(--text2)">w: Häns-chen klein</span> → „Häns" + „chen" auf zwei Noten</td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">_&nbsp;(Unterstrich)</td><td style="padding:4px 8px">hält die vorige Silbe über die <b>nächste Note</b> (Melisma — ein Wort über mehrere Töne).<br><span style="font-family:monospace;color:var(--text2)">w: ah _ _ _</span> → „ah" über 4 Noten</td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">*&nbsp;(Stern)</td><td style="padding:4px 8px">leere Silbe — überspringt eine Note ohne Text.<br><span style="font-family:monospace;color:var(--text2)">w: la * la</span></td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">|&nbsp;(senkrecht)</td><td style="padding:4px 8px">rückt zum nächsten Taktstrich vor (Silben mit Takten ausrichten).<br><span style="font-family:monospace;color:var(--text2)">w: Häns-chen klein | ging al-lein</span></td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">~&nbsp;(Tilde)</td><td style="padding:4px 8px">verbindet Wörter zu <b>einer</b> Silbe (sichtbares Leerzeichen, aber nur eine Note).<br><span style="font-family:monospace;color:var(--text2)">w: der~Mond</span> → „der Mond" auf einer Note</td></tr>
<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">-­-&nbsp;(Doppel)</td><td style="padding:4px 8px">erzeugt einen sichtbaren Bindestrich, der stehen bleibt (z.B. langer Silbenbogen).</td></tr>
<tr><td style="padding:4px 8px;font-family:monospace;font-weight:700;white-space:nowrap;vertical-align:top">\-</td><td style="padding:4px 8px">ein echter Bindestrich als Zeichen im Wort (kein Silbentrenner).</td></tr>
</table>
<p style="margin:0 0 6px"><b>Mehrere Strophen:</b> einfach mehrere <code>w:</code>-Zeilen direkt untereinander schreiben — jede ist eine eigene Strophe:</p>
<p style="margin:0 0 10px;font-family:monospace;font-size:12px;line-height:1.8;background:var(--bg-secondary);padding:8px 10px;border-radius:6px">
C D E F | G A G2 |<br>
w: Al-le mei-ne Ent-chen<br>
w: schwim-men auf dem See,
</p>
<p style="margin:0 0 4px"><b>Vollständiges Beispiel:</b></p>
<p style="margin:0 0 12px;font-family:monospace;font-size:12px;line-height:1.8;background:var(--bg-secondary);padding:8px 10px;border-radius:6px">
X:1<br>
T:Hänschen Klein<br>
M:4/4<br>
L:1/4<br>
K:G<br>
D2 B2 | A2 G2 | F2 F2 | E2 E2 |<br>
w: Häns-chen klein | ging al-lein | in die wei-te | Welt hin-ein.
</p>
<p style="margin:0 0 12px;font-size:12px;color:var(--text2)">
<b>Groß vs. klein:</b> <code>w:</code> (klein) richtet Silben unter den Noten aus. <code>W:</code> (groß) ist ein Textblock am Liedende, der <b>nicht</b> den Noten zugeordnet wird — z.B. für weitere Strophen als Fließtext.
</p>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">Speichern, Drucken & Export</h3>
<p style="margin:0 0 12px">
<b>＋ Aktuelles Lied speichern</b> — legt das Lied im Browser-Speicher ab (bleibt nach Neuladen erhalten).<br>

<h3 style="margin:0 0 6px;color:var(--blue);font-size:14px">ABC-Notation (Textfeld)</h3>
<p style="margin:0 0 4px">Direkt editierbar mit Syntax-Färbung. Wichtigste Zeichen:</p>
<p style="margin:0;font-family:monospace;font-size:12px;line-height:1.9;background:var(--bg-secondary);padding:8px 10px;border-radius:6px">
X: Nummer &nbsp; T: Titel &nbsp; C: Komponist<br>
M: Taktart &nbsp; L: Einheitslänge &nbsp; Q: Tempo &nbsp; K: Tonart<br>

// ── Liedtext (w:) toggle ──────────────────────────────────────────────
function isEmptyLyric(line){ return /^w:\s*$/.test(line.trim()); }
function isMusicLine(line){
  const t=line.trim();
  if(!t) return false;
  if(/^[A-Za-z]:/.test(t)) return false;      // header/info field (X: T: w: V: …)
  if(/^\[V:\d+\]/.test(t)) return false;       // we handle voice lines separately
  if(t.startsWith('%')) return false;          // directive/comment
  return /[A-Ga-gz]/.test(t);                  // contains at least one note/rest
}
function hasLyricBelow(lines,i){
  const next=lines[i+1]!==undefined?lines[i+1].trim():'';
  return /^w:/.test(next);
}
function addLyricLines(){
  const lines=abcTa.value.split('\n');
  const out=[];
  if(voiceMode==='multi'){
    // one w: directly after the [V:2] note line (if none there yet)
    for(let i=0;i<lines.length;i++){
      out.push(lines[i]);
      if(/^\[V:2\]/.test(lines[i].trim()) && !hasLyricBelow(lines,i)){
        out.push('w: ');
      }
    }
  } else {
    // single: after each music line lacking a w: directly below
    for(let i=0;i<lines.length;i++){
      out.push(lines[i]);
      if(isMusicLine(lines[i]) && !hasLyricBelow(lines,i)){
        out.push('w: ');
      }
    }
  }
  abcTa.value=out.join('\n');
  updateHL();scheduleRender();
}
function removeEmptyLyricLines(){
  abcTa.value=abcTa.value.split('\n').filter(l=>!isEmptyLyric(l)).join('\n');
  updateHL();scheduleRender();
}
function setLyrics(on){
  lyricsOn=on;
  const btn=$('lyricsToggle');
  btn.classList.toggle('on',on);
  btn.setAttribute('aria-pressed',on?'true':'false');
  $('ltState').textContent=on?'An':'Aus';
  if(on) addLyricLines(); else removeEmptyLyricLines();
}
$('lyricsToggle').addEventListener('click',()=>setLyrics(!lyricsOn));
// Detect existing w: lines when loading, to set toggle state
function syncLyricsState(){
  const has=/^w:/m.test(abcTa.value);
  lyricsOn=has;
  const btn=$('lyricsToggle');
  btn.classList.toggle('on',has);
  btn.setAttribute('aria-pressed',has?'true':'false');
  $('ltState').textContent=has?'An':'Aus';
}
